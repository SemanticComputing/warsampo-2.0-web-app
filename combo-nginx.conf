server {
    listen ${SAMPO_UI_CLIENT_PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the Express backend.
    # The client bundle uses API_URL=/api/v1 (relative), so the browser
    # hits nginx on port 80 and nginx forwards to Express on port 3001.
    location /api/ {
        proxy_pass         http://127.0.0.1:${SAMPO_UI_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Expose Express /health through nginx for external health checks.
    location /health {
        proxy_pass http://127.0.0.1:${SAMPO_UI_SERVER_PORT}/health;
    }

    # Custom components served from a bind-mounted volume.
    location /custom-components/ {
        alias /app/custom-components/;
    }

    # SPA fallback for react-router.
    location / {
        try_files $uri /index.html;
    }
}
